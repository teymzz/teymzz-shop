<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="./css/signup.css">
</head>
<body class="flex center">
  <div class="page-grid grid">
    <section class="banner grid center">
      <img src="https://blogger.googleusercontent.com/img/a/AVvXsEghdXVxxAlp1t_cKedjD8EZ9toGFYAPe_c40Sdogsj12fzOjV65u4rsHBVo7jnViKGu7pFKEncx3FcIh9GAJqz0IXOwuX1HW5hA_9uy58L4bOj-uZUWTysmgi9WMf1FTdD_EmL2xeVFsJhSf3gr8c5tiGX8frQdZtUv1ny-LEui0HDr0RmCCmY0bUaA" alt="Logo">
    </section>
    <section class="form-wrapper grid center">
      <form action="" class="form-section">
        <div class="header">
          <h1>Create Account</h1>
          <p>Get started by filling in your details below</p>
        </div>
        <div class="field">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" placeholder="Enter your full name">
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password">
        </div>
        <div class="field">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Confirm your password">
        </div>
        <div class="terms-section flex">
          <input type="checkbox" id="terms">
          <label for="terms">I agree to the <a href="#0">Terms of Service</a> and <a href="#0">Privacy Policy</a></label>
        </div>
        <button type="button" class="btn btn-primary" onclick="signUpUser(event)">Sign up</button>
        <div class="btn google-sign-in flex center">
          <svg width="148" height="148" viewBox="0 0 148 148" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M144.156 75.6583C144.156 70.7639 143.759 65.8431 142.912 61.0281H75V88.754H113.89C112.276 97.6962 107.091 105.607 99.4982 110.633V128.623H122.7C136.325 116.083 144.156 97.5639 144.156 75.6583Z" fill="#4285F4" />
            <path d="M75.0002 146.005C94.4189 146.005 110.795 139.629 122.726 128.623L99.5249 110.633C93.0696 115.025 84.736 117.512 75.0266 117.512C56.2429 117.512 40.3164 104.839 34.6019 87.8016H10.6592V106.347C22.8819 130.661 47.777 146.005 75.0002 146.005Z" fill="#34A853" />
            <path d="M34.5752 87.8016C31.5592 78.8595 31.5592 69.1766 34.5752 60.2345V41.6888H10.659C0.446995 62.0335 0.446995 86.0026 10.659 106.347L34.5752 87.8016Z" fill="#FBBC04" />
            <path d="M75.0002 30.498C85.2651 30.3393 95.1861 34.2018 102.62 41.2921L123.176 20.7357C110.16 8.51303 92.8844 1.7932 75.0002 2.00485C47.7769 2.00485 22.8819 17.3493 10.6592 41.6889L34.5754 60.2346C40.2634 43.1703 56.2164 30.498 75.0002 30.498Z" fill="#EA4335" />
          </svg>
          Sign up with Google
        </div>
        <div class="footer">
          <p>Already have an account? <a href="./login.html">Sign in</a></p>
        </div>
      </form>
    </section>
  </div>

</body>
</html>

 <script src="js/login.js"></script>

 <script>
  function signUpUser(ev) {
      // ev.preventDefault()
      let fullname = document.getElementById('fullname').value.trim()
      let email = document.getElementById('email').value.trim()
      let password = document.getElementById('password').value.trim()
      let confirmPassword = document.getElementById('confirm-password').value.trim()
      let terms = document.getElementById('terms').checked

      if (!fullname || !email || !password || !confirmPassword ) {
          alert('all fields are required')
      } else if (!terms){
          alert('please agree to terms and conditions')
      } else if ( usersDatabase.find(( user , i )=> { return user.email === email }) ){
      alert('user already exists')
      }

      
      else  if  ( password !== confirmPassword){
          alert('passwords must match')
      } else if ( password.length < 8){
            alert('passwords must be atleast 8 characters')
      }    
      else {
      ev.target.innerHTML = 'Loading..'
      ev.target.disabled = true


        setTimeout(() => {
            let userObj = {
              fullname,
              email,
              password,
              terms , 
              profilePic: null 
          }

          usersDatabase.push(userObj)
          localStorage.setItem('AprilUsers' , JSON.stringify(usersDatabase))
          alert('SIGN UP SUCCESSFUL')
          ev.target.innerHTML = 'Sign up'
          ev.target.disabled = false
          window.location.href = 'login.html'
        }, 3000);

        
      }


  }


  </script>
