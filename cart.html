<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart</title>
  <link rel="stylesheet" href="./css/shop.css" />

  <style>
    .cart-container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 2rem;
      max-width: 1200px;
      margin-top: 2rem;
    }
    .cart-items-section {
      background: var(--primary);
      border-radius: 1.25rem;
      padding: 2rem;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
    }
    .cart-items-section h2 {
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }
    .cart-item {
      display: flex;
      gap: 1.5rem;
      padding: 1.5rem;
      border-bottom: 1px solid var(--secondary);
      align-items: flex-start;
    }
    .cart-item:last-child {
      border-bottom: none;
    }
    .cart-item-image {
      width: 120px;
      height: 120px;
      background: var(--secondary);
      border-radius: 0.75rem;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cart-item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cart-item-details {
      flex: 1;
    }
    .cart-item-title {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }
    .cart-item-price {
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .qty-controls {
      display: flex;
      align-items: center;
      background: var(--secondary);
      border-radius: 0.5rem;
      width: fit-content;
    }
    .qty-controls button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem 0.75rem;
      color: var(--accent);
      font-weight: 600;
    }
    .qty-controls input {
      width: 45px;
      text-align: center;
      border: none;
      background: transparent;
      font-weight: 600;
    }
    .remove-btn {
      background: none;
      border: none;
      color: #ff6b6b;
      cursor: pointer;
      font-weight: 600;
      padding: 0.5rem;
      transition: opacity 0.2s;
    }
    .remove-btn:hover {
      opacity: 0.7;
    }
    .cart-summary {
      background: var(--primary);
      border-radius: 1.25rem;
      padding: 2rem;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
      height: fit-content;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid var(--secondary);
    }
    .summary-row:last-of-type {
      border-bottom: none;
      font-size: 1.25rem;
      font-weight: 700;
      padding-top: 1.5rem;
    }
    .checkout-section {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .checkout-btn {
      background: var(--accent);
      color: var(--primary);
      padding: 1rem;
      border: none;
      border-radius: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      font-size: 1rem;
    }
    .checkout-btn:hover {
      opacity: 0.95;
    }
    .checkout-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .continue-shopping {
      background: var(--secondary);
      color: var(--text);
      padding: 1rem;
      border: none;
      border-radius: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: opacity 0.2s;
    }
    .continue-shopping:hover {
      opacity: 0.9;
    }
    .empty-cart {
      grid-column: 1 / -1;
      background: var(--primary);
      border-radius: 1.25rem;
      padding: 4rem 2rem;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
    }
    .empty-cart p {
      color: #4d5270;
      margin-bottom: 1.5rem;
      font-size: 1.1rem;
    }
    .empty-cart a {
      background: var(--accent);
      color: var(--primary);
      padding: 0.95rem 2rem;
      border-radius: 0.75rem;
      text-decoration: none;
      font-weight: 600;
      display: inline-block;
      transition: opacity 0.2s;
    }
    .empty-cart a:hover {
      opacity: 0.95;
    }
    @media (max-width: 980px) {
      .cart-container {
        grid-template-columns: 1fr;
      }
      .cart-summary {
        height: auto;
      }
    }
    @media (max-width: 680px) {
      .cart-item {
        flex-direction: column;
        gap: 1rem;
      }
      .cart-item-image {
        width: 100%;
        max-width: 200px;
        margin: 0 auto;
      }
      .cart-item-controls {
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
      }
    }
  </style>
</head>

  <main class="main-content">
    <header class="top-bar flex">
      <div class="greeting">
        <h1>Shopping Cart</h1>
        <p>Review your items and proceed to checkout</p>
      </div>
      <div class="cart-area flex center" id="cartToggle">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span class="cart-count" id="cartCount">0</span>
      </div>
    </header>

    <section id="cartContainer" class="cart-container"></section>
  </main>

  <script>

    let currentUserObj = getUser();
    let cart = JSON.parse(localStorage.getItem('cart')) || [];

    function updateCartCount() {
      const count = cart.reduce((total, item) => total + item.quantity, 0);
      document.getElementById('cartCount').textContent = count;
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      updateCartCount();
    }

    function updateQuantity(index, newQuantity) {
      if (newQuantity <= 0) {
        removeFromCart(index);
        return;
      }
      cart[index].quantity = newQuantity;
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      updateCartCount();
    }

    function increaseQty(index) {
      cart[index].quantity += 1;
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      updateCartCount();
    }

    function decreaseQty(index) {
      if (cart[index].quantity > 1) {
        cart[index].quantity -= 1;
      } else {
        removeFromCart(index);
        return;
      }
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      updateCartCount();
    }

    function calculateTotals() {
      let subtotal = 0;
      cart.forEach(item => {
        subtotal += item.price * item.quantity;
      });
      const shipping = subtotal > 0 ? 10 : 0;
      const tax = (subtotal * 0.1).toFixed(2);
      const total = (subtotal + parseFloat(shipping) + parseFloat(tax)).toFixed(2);

      return {
        subtotal: subtotal.toFixed(2),
        shipping: shipping.toFixed(2),
        tax: tax,
        total: total
      };
    }

    function renderCart() {
      const container = document.getElementById('cartContainer');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <p>Your cart is empty</p>
            <a href="shop.html">Continue Shopping</a>
          </div>
        `;
        updateCartCount();
        return;
      }

      const totals = calculateTotals();

      let cartItemsHTML = '';
      cart.forEach((item, index) => {
        const itemTotal = (item.price * item.quantity).toFixed(2);
        cartItemsHTML += `
          <div class="cart-item">
            <div class="cart-item-image">
              <img src="${item.thumbnail}" alt="${item.title}" />
            </div>
            <div class="cart-item-details">
              <div class="cart-item-title">${item.title}</div>
              <div class="cart-item-price">$${item.price} each</div>
              <div class="cart-item-controls">
                <div class="qty-controls">
                  <button onclick="decreaseQty(${index})">−</button>
                  <input type="number" value="${item.quantity}" onchange="updateQuantity(${index}, parseInt(this.value))" min="1">
                  <button onclick="increaseQty(${index})">+</button>
                </div>
                <span style="font-weight: 600;">$${itemTotal}</span>
                <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
              </div>
            </div>
          </div>
        `;
      });

      const cartHTML = `
        <div class="cart-items-section">
          <h2>Shopping Cart (${cart.length} item${cart.length !== 1 ? 's' : ''})</h2>
          ${cartItemsHTML}
        </div>
        <div class="cart-summary">
          <div class="summary-row">
            <span>Subtotal</span>
            <span>$${totals.subtotal}</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span>$${totals.shipping}</span>
          </div>
          <div class="summary-row">
            <span>Tax (10%)</span>
            <span>$${totals.tax}</span>
          </div>
          <div class="summary-row">
            <span>Total</span>
            <span>$${totals.total}</span>
          </div>
          <div class="checkout-section">
            <button class="checkout-btn" onclick="proceedToPayment('${totals.total}')">
              Proceed to Payment
            </button>
            <a class="continue-shopping" href="shop.html">Continue Shopping</a>
          </div>
        </div>
      `;

      container.innerHTML = cartHTML;
      updateCartCount();
    }

    function proceedToPayment(totalAmount) {
      const amountInCents = Math.round(parseFloat(totalAmount) * 100);
      const amountInNaira = amountInCents * 1350;
      payWithPaystack(amountInNaira, currentUserObj.email);
    }

    function payWithPaystack(amountInNaira, userEmail) {
      PaystackPop.setup({
        key: 'pk_test_9a558288d1670a641dafa6f4e899ddb24f2fe749',
        email: userEmail,
        amount: amountInNaira,
        callback: (transaction) => {
          console.log('Payment successful:', transaction);
          alert('🎉 Payment successful! Thank you for your purchase.');
          cart = [];
          localStorage.setItem('cart', JSON.stringify(cart));
          renderCart();
          updateCartCount();
          setTimeout(() => {
            window.location.href = 'shop.html';
          }, 2000);
        },
        onClose: () => {
          console.log('Payment window closed');
        },
        onError: (error) => {
          console.log('Error: ', error.message);
          alert('❌ Payment failed: ' + error.message);
        }
      }).openIframe();
    }

    renderCart();
  </script>
  <script src="js/profile.js"></script>
</body>
