  <script>

    let currentUserObj = getUser();
    let cart = getCart(currentUserObj);

    function updateCartCount() {
      const count = cart.reduce((total, item) => total + item.quantity, 0);
      document.getElementById('cartCount').textContent = count;
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      currentUserObj.cart = cart;
      saveUser(currentUserObj)
      //localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
      updateCartCount();
    }

    function updateQuantity(index, newQuantity) {
      if (newQuantity <= 0) {
        removeFromCart(index);
        return;
      }
      cart[index].quantity = newQuantity;
      
      currentUserObj.cart = cart;
      saveUser(currentUserObj)

      renderCart();
      updateCartCount();
    }

    function increaseQty(index) {
      cart[index].quantity += 1;
      
      currentUserObj.cart = cart;
      saveUser(currentUserObj)
      renderCart();
      updateCartCount();
    }

    function decreaseQty(index) {
      if (cart[index].quantity > 1) {
        cart[index].quantity -= 1;
      } else {
        removeFromCart(index);
        return;
      }
      
      currentUserObj.cart = cart;
      saveUser(currentUserObj)
      renderCart();
      updateCartCount();
    }

    function calculateTotals() {
      let subtotal = 0;
      cart.forEach(item => {
        subtotal += item.price * item.quantity;
      });
      const shipping = subtotal > 0 ? 10 : 0;
      const tax = (subtotal * 0.1).toFixed(2);
      const total = (subtotal + parseFloat(shipping) + parseFloat(tax)).toFixed(2);

      return {
        subtotal: subtotal.toFixed(2),
        shipping: shipping.toFixed(2),
        tax: tax,
        total: total
      };
    }

    function renderCart() {
      const container = document.getElementById('cartContainer');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <p>Your cart is empty</p>
            <a href="shop.html">Continue Shopping</a>
          </div>
        `;
        updateCartCount();
        return;
      }

      const totals = calculateTotals();

      let cartItemsHTML = '';
      cart.forEach((item, index) => {
        const itemTotal = (item.price * item.quantity).toFixed(2);
        cartItemsHTML += `
          <div class="cart-item">
            <div class="cart-item-image">
              <img src="${item.thumbnail}" alt="${item.title}" />
            </div>
            <div class="cart-item-details">
              <div class="cart-item-title">${item.title}</div>
              <div class="cart-item-price">$${item.price} each</div>
              <div class="cart-item-controls">
                <div class="qty-controls">
                  <button onclick="decreaseQty(${index})">−</button>
                  <input type="number" value="${item.quantity}" onchange="updateQuantity(${index}, parseInt(this.value))" min="1">
                  <button onclick="increaseQty(${index})">+</button>
                </div>
                <span class="item-total" style="font-weight: 600;">$${itemTotal}</span>
                <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>
              </div>
            </div>
          </div>
        `;
      });

      const cartHTML = `
        <div class="cart-items-section">
          <h2>Shopping Cart (${cart.length} item${cart.length !== 1 ? 's' : ''})</h2>
          ${cartItemsHTML}
        </div>
        <div class="cart-summary">
          <div class="summary-row">
            <span>Subtotal</span>
            <span>$${totals.subtotal}</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span>$${totals.shipping}</span>
          </div>
          <div class="summary-row">
            <span>Tax (10%)</span>
            <span>$${totals.tax}</span>
          </div>
          <div class="summary-row">
            <span>Total</span>
            <span>$${totals.total}</span>
          </div>
          <div class="checkout-section">
            <button class="checkout-btn" onclick="proceedToPayment('${totals.total}')">
              Proceed to Payment
            </button>
            <a class="continue-shopping" href="shop.html">Continue Shopping</a>
          </div>
        </div>
      `;

      container.innerHTML = cartHTML;
      updateCartCount();
    }

    function proceedToPayment(totalAmount) {
      const amountInCents = Math.round(parseFloat(totalAmount) * 100);
      const amountInNaira = amountInCents * 1350;
      payWithPaystack(amountInNaira, currentUserObj.email);
    }

    function payWithPaystack(amountInNaira, userEmail) {
      PaystackPop.setup({
        key: 'pk_test_9a558288d1670a641dafa6f4e899ddb24f2fe749',
        email: userEmail,
        amount: amountInNaira,
        callback: (transaction) => {
          console.log('Payment successful:', transaction);
          alert('🎉 Payment successful! Thank you for your purchase.');
          cart = [];
          localStorage.setItem('cart', JSON.stringify(cart));
          renderCart();
          updateCartCount();
          setTimeout(() => {
            window.location.href = 'shop.html';
          }, 2000);
        },
        onClose: () => {
          console.log('Payment window closed');
        },
        onError: (error) => {
          console.log('Error: ', error.message);
          alert('❌ Payment failed: ' + error.message);
        }
      }).openIframe();
    }

    renderCart();
  </script>
  <script>
    function renderImage(){
      let cartImages = document.querySelectorAll('.cart-item-image img');
      let themeMode = getThemeMode();
      let imageSrc = themeMode === 'dark'? 'offline-dark' : 'offline';
  
      cartImages.forEach(image => {
        image.src = `images/${imageSrc}.png`;
      })
    }
    
    if(!navigator.onLine){
      renderImage();
      window.addEventListener('visibilitychange', function(){
        if(document.visibilityState === 'visible'){
          renderImage()
        }
      })
    }
  </script>
