    <script>
        function loadSettings() {
            let settings = getCurrentSettings(); // Load settings from localStorage
            if(!settings) return ;

            // Display settings
            document.getElementById('themeSelect').value = settings.display.theme;
            document.getElementById('fontSize').value = settings.display.fontSize;
            document.getElementById('autoSave').checked = settings.account.autoSave;
        }

        window.addEventListener('DOMContentLoaded', function() {
            loadSettings();

            // Save button
            const saveButton = document.getElementById('saveButton');
            if (saveButton) {
                saveButton.addEventListener('click', saveSettings);
            }

            // Reset button
            const resetButton = document.getElementById('resetButton');
            if (resetButton) {
                resetButton.addEventListener('click', resetSettings);
            }

            // Logout button
            const logoutButton = document.getElementById('logoutButton');
            if (logoutButton) {
                logoutButton.addEventListener('click', function() {
                    const confirmed = confirm('Are you sure you want to logout?');
                    if (confirmed) {
                        localStorage.removeItem('currentUserIndex');
                        window.location.href = 'login.html';
                    }
                });
            }

            // Update profile picture
            const user = getUser();
            if (user && user.profilePic) {
                const profilePicElement = document.getElementById('profilepic');
                if (profilePicElement) {
                    profilePicElement.src = user.profilePic;
                }
            }

            // Auto-save on any setting change
            const inputs = document.querySelectorAll('input[type="checkbox"], select');
            inputs.forEach(input => {
                input.addEventListener('change', function() {
                    if (document.getElementById('autoSave').checked) {
                        saveSettings();
                    }
                });
            });
        });
    </script>
