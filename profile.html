    <main class="main-content">
        <div class="container">
            <h1>User Profile</h1>

            <div class="profile-content">
                <!-- Image Upload Section -->
                <div class="upload-section">
                    <div class="upload-form">
                        <div id="previewContainer" class="preview-container">
                            <img id="previewImage" src="images/user1.png" alt="Profile Picture" class="preview-image">
                        </div>
                        <input 
                            type="file" 
                            id="imageInput" 
                            accept="image/*"
                            aria-label="Choose image file"
                        >
                        <label for="imageInput" class="file-label">
                            Choose Image
                        </label>
                        <div class="button-group">
                            <button id="saveButton" class="btn btn-primary">Save Profile Picture</button>
                            <button id="clearButton" class="btn btn-secondary">Clear Picture</button>
                        </div>
                    </div>
                </div>

                <!-- User Details Section -->
                <div class="user-details-section">
                    <h2>Personal Information</h2>
                    <div class="details-content">
                        <div class="detail-item">
                            <label>Full Name</label>
                            <p id="userFullName">--</p>
                        </div>
                        <div class="detail-item">
                            <label>Email Address</label>
                            <p id="userEmail">--</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Info Section -->
            <div class="info-section">
                <p id="statusMessage" class="status-message"></p>
                <p class="note">Note: The image path is saved to localStorage. This is a local storage demo - the image file itself is not uploaded to a server.</p>
            </div>
        </div>
    </main>

    <script>
        
    </script>
    <script src="js/profile.js"></script>
</body>
</html>
