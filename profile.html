    <script>

        let userdata = getUser(); 

        let fullname = userdata.fullname.split(' ');

        ufname.value = fullname[0];
        ulname.value = fullname[1];
        uemail.value = userdata.email;
        if(userdata.location) ulocation.value = userdata.location;

    </script>
