    <style>
        .spinner {
            /* Size and shape */
            width: 1em;
            height: 1em;
            border-radius: 50%;
            
            /* The track (light gray) and the moving indicator (blue) */
            border: 6px solid #f3f3f3;
            border-top: 6px solid #6944c5;
            
            /* The animation loop */
            animation: spin 1s linear infinite;
        }

        .spinner, .uploaded {
            display: none;
        }

        /* The rotation logic */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .upload-section {
            background: #ffffff;
            padding: 40px;
            border-radius: 8px;
            min-height: 85vh;
            box-shadow: 0 0 5px 0px #e9e9e9;
            .user-details-section {
                h2 {
                    margin-top: 20px;
                    color: #6944c5;
                }
            }
            .detail-item p {
                color: #938a8a;
                border-bottom: 1px solid #e1e3e9;
            }
        }
        .modifier-section {
            border-radius: 8px;
            width: 100%;
            min-height: 85vh;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 1em;
            background-color: white;

            .update-profile{
                text-transform: uppercase;
                font-size: 1.2rem;
                color: #6944c5;
            }

            .input-area {
                display: flex;
                flex-direction: column;
                gap: 1em;
                div:has(> input){
                    padding: 4px;
                    border: solid 1px #efefef;

                    h4 {
                        font-weight: normal;
                        color:#6857ad;
                    }
                    input {
                        border: none;
                        outline: none;
                        color: #919191;
                        background-color: transparent;
                    }
                }
                .password-area {
                    h4{
                        text-transform: uppercase;
                        color: rgb(105, 105, 105);
                        font-weight: normal;
                        + div {
                            border-bottom: none;
                        }
                    }
                }
            }
            .save-update {
                padding: 6px 12px;
                margin-block: auto;
                border-radius: 5px;
                background-color: #6944c5;
                cursor: pointer;
                button {
                    width: 100%;
                    cursor: pointer;
                    text-align: center;
                    color: white;
                    background-color: transparent;
                    border: none;
                    outline: none;
                }
            }
            .save-update:hover {
                background-color: #5637a3;
                /* opacity: .7; */
            }
        }
        .image-control{
            display: flex;
            flex-direction: column;
            gap: 1.5em;
            .image-box {
                display: flex;
                justify-content: center;
                background: #f5f5f5;
                padding: 9px;
                height: 140px;
                width: 140px;
                border-radius: 5px;
                overflow: hidden;
                box-shadow: 0 0 20px 0 #ffffec;
                outline: solid 1px #f3f3f3;
                outline-offset: 2px;
                img{
                    width: 100%;
                    height: 100%;
                    background: #ebebeb;
                }
            }
        }
        .buttons {
            .button-group {
                width: 100%;

                .file-label {
                    width: 100%;
                    padding: 8px 12px;
                    display: flex; 
                    align-items: center; 
                    gap: .5em;
                    font-size: .75rem;;
                    font-weight: 600;
                    color: #706a85;
                    background-color: #f9f9f9;
                    background-image: linear-gradient(206deg, #e3e3e3, transparent);
                    box-shadow: 0 0 2px 0 #cdcdcd;
                    border-radius: 100vh;
                    label {
                        /* outline: solid #6944c5; */
                        background: white;
                        color: #6944c5;
                        background: #6857ad;
                        color: white;
                    }
                    .remove {
                        background: #c12020;
                        color: white;
                    }
                }
            }
        }

        .theme-dark {
            .upload-section {
                background: #07051c;
                box-shadow: 0 0 23px 0px #000000;
                background-image: linear-gradient(45deg, #0f072b, transparent);
                outline: solid 1px #19193b;
                .detail-item p {
                    color: #b7b0b0;
                    border-bottom: 1px solid #22283b;
                }
            }
            .modifier-section {
                background-color: #07051c;
                box-shadow: 0 0 25px 0px black;
                background-image: linear-gradient(45deg, #10072d, transparent);
                outline: solid 1px #19193b;
                
                .save-update {
                    background-color: #452d81;
                }

                .input-area {
                    div:has(> input){
                        border: solid 1px #3c365b;
                        background: transparent;
                    }

                    .password-area {
                        div:has(> input):not(:first-of-type) {
                            border-top: none;
                        }
                    }
                }
                .update-profile{
                    color: #a480ff;
                }
            }
            .image-control {
                .image-box {
                    box-shadow: 0 0 20px 0 #000000;
                    border: solid 5px #060112;
                    background: #07051c;
                    outline: solid 1px #181127;
                }
            }
            .buttons {
                & .button-group {
                    .file-label {
                        color: #ffffff;
                        background-color: #6944c5;
                        box-shadow: 0 0 2px 0 #0a0a0a;
                        background-image: linear-gradient(179deg, black, #00000069), linear-gradient(358deg, #090620, #00000069);
                    }
                }
            }
            .user-details-section {
                h2 {
                    color: #c7c6c6;
                    border-bottom: 2px solid #6944c5;
                }
            }
        }
    </style>
